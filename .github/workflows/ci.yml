name: Log Analytics Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Pipeline Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install kafka-python==2.0.2 pytest==7.4.0
      - run: pytest tests/ -v --tb=short

  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          test -f producer/producer.py
          test -f consumer/consumer.py
          test -f README.md
          echo "✅ All files present"
